<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic QR Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Dynamic QR Demo</h1>
        <img id="qrImage" alt="Dynamische QR-code">
        <p>Vervalt over</p>
        <p id="countdown">20s</p>
        <p id="qrStatus">Klik om een QR-code te laden.</p>
        <button id="generateButton" type="button" onclick="generateQr()">Laat QR-code zien</button>
    </main>

<script src="script.js"></script>
</body>
</html>
